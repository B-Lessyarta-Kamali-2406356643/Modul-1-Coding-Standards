<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Order History</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            color: #1f2937;
        }

        .container {
            max-width: 680px;
            margin: 60px auto;
            background: #ffffff;
            border-radius: 18px;
            padding: 36px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
        }

        h1 {
            margin-top: 0;
            font-size: 30px;
        }

        p.subtitle {
            color: #6b7280;
            margin-bottom: 28px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            box-sizing: border-box;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid #d1d5db;
            font-size: 14px;
            margin-bottom: 16px;
        }

        .btn {
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px 18px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
        }

        .btn:hover {
            background: #1d4ed8;
        }

        .link-row {
            margin-top: 18px;
        }

        .link-row a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 600;
        }

        .link-row a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Order History</h1>
    <p class="subtitle">Search orders by author to continue to payment.</p>

    <form th:action="@{/order/history}" method="post">
        <label for="author">Author</label>
        <input type="text" id="author" name="author" placeholder="Enter author name" required>
        <button class="btn" type="submit">Search Orders</button>
    </form>

    <div class="link-row">
        <a th:href="@{/order/create}">Create New Order</a>
    </div>
</div>
</body>
</html>
