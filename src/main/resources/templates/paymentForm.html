<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Payment Form</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            color: #1f2937;
        }

        .container {
            max-width: 760px;
            margin: 50px auto;
            background: #ffffff;
            border-radius: 18px;
            padding: 36px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
        }

        h1 {
            margin-top: 0;
            font-size: 30px;
        }

        .subtitle {
            color: #6b7280;
            margin-bottom: 24px;
        }

        .info-box {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            padding: 18px;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
        }

        input, select {
            width: 100%;
            box-sizing: border-box;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid #d1d5db;
            font-size: 14px;
        }

        .btn {
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px 18px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
        }

        .btn:hover {
            background: #1d4ed8;
        }

        .not-found {
            padding: 24px;
            background: #fff7ed;
            border: 1px solid #fdba74;
            border-radius: 14px;
            color: #9a3412;
        }

        .back-link {
            display: inline-block;
            margin-top: 18px;
            color: #2563eb;
            text-decoration: none;
            font-weight: 600;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="container">
    <div th:if="${order != null}">
        <h1>Payment Form</h1>
        <p class="subtitle">Choose a payment method and complete the order.</p>

        <div class="info-box">
            <p><strong>Order ID:</strong> <span th:text="${order.id}"></span></p>
            <p><strong>Author:</strong> <span th:text="${order.author}"></span></p>
            <p><strong>Status:</strong> <span th:text="${order.status}"></span></p>
        </div>

        <form th:action="@{/order/pay/{orderId}(orderId=${order.id})}" method="post">
            <div class="form-group">
                <label for="method">Payment Method</label>
                <select id="method" name="method" onchange="toggleFields()" required>
                    <option value="VOUCHER_CODE">Voucher Code</option>
                    <option value="CASH_ON_DELIVERY">Cash on Delivery</option>
                </select>
            </div>

            <div class="form-group" id="voucherSection">
                <label for="voucherCode">Voucher Code</label>
                <input type="text" id="voucherCode" name="voucherCode" placeholder="Example: ESHOP1234ABC5678">
            </div>

            <div id="codSection" style="display:none;">
                <div class="form-group">
                    <label for="address">Address</label>
                    <input type="text" id="address" name="address" placeholder="Enter delivery address">
                </div>

                <div class="form-group">
                    <label for="deliveryFee">Delivery Fee</label>
                    <input type="text" id="deliveryFee" name="deliveryFee" placeholder="Example: 15000">
                </div>
            </div>

            <button class="btn" type="submit">Submit Payment</button>
        </form>

        <a class="back-link" th:href="@{/order/history}">Back to Order History</a>
    </div>

    <div th:if="${order == null}" class="not-found">
        <h1>Order Not Found</h1>
        <p>The requested order could not be found. Please go back and choose another order.</p>
        <a class="back-link" th:href="@{/order/history}">Back to Order History</a>
    </div>
</div>

<script>
    function toggleFields() {
        const method = document.getElementById("method").value;
        const voucherSection = document.getElementById("voucherSection");
        const codSection = document.getElementById("codSection");

        if (method === "VOUCHER_CODE") {
            voucherSection.style.display = "block";
            codSection.style.display = "none";
        } else {
            voucherSection.style.display = "none";
            codSection.style.display = "block";
        }
    }

    window.onload = toggleFields;
</script>
</body>
</html>
