<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Pay Order</title>
</head>
<body>
<h1>Pay Order</h1>

<p th:text="'Order ID: ' + ${order.id}"></p>
<p th:text="'Author: ' + ${order.author}"></p>

<form th:action="@{/order/pay/{orderId}(orderId=${order.id})}" method="post">
    <label>Method:</label>
    <select name="method">
        <option value="VOUCHER_CODE">Voucher Code</option>
        <option value="CASH_ON_DELIVERY">Cash on Delivery</option>
    </select>

    <div>
        <label>Voucher Code:</label>
        <input type="text" name="voucherCode">
    </div>

    <div>
        <label>Address:</label>
        <input type="text" name="address">
    </div>

    <div>
        <label>Delivery Fee:</label>
        <input type="text" name="deliveryFee">
    </div>

    <button type="submit">Submit Payment</button>
</form>
</body>
</html>
